name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libsnappy-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (all 40 tests)
        run: ctest --test-dir build --output-on-failure

  build-asan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libsnappy-dev

      - name: Configure (ASan)
        run: cmake -B build-asan -S . -DASAN=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build (ASan)
        run: cmake --build build-asan -j$(nproc)

      - name: Test (ASan — all 40 tests)
        run: ctest --test-dir build-asan --output-on-failure
